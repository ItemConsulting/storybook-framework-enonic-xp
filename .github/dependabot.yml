version: 2
updates:
  # Keep npm dependencies current.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # @types/node tracks the Node 24 runtime (see package.json "engines" / .nvmrc),
      # so don't propose newer majors — only 24.x minor/patch updates.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      # Batch non-major updates into a single PR to cut noise.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep GitHub Actions pinned versions current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
